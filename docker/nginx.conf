# Servidor para la carpeta estática que genera Vite (dist/)
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: rutas del cliente (React Router, etc.) → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache razonable para assets con hash en el nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
