# Despliega el build de Vite a GitHub Pages (rama gh-pages no hace falta: Actions sube el artefacto).
# En el repo: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: yarn

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          # Misma ruta que GitHub Pages para un repo "project site"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
